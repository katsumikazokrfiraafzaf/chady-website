<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Digital Clock</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: #282c34;\n            color: white;\n            font-family: Arial, sans-serif;\n        }\n        .clock {\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n        }\n        .timezone {\n            margin: 5px;\n            font-size: 1.2em;\n        }\n    </style>\n</head>\n<body>\n    <div class="clock">\n        <div class="timezone" id="utc">UTC: </div>\n        <div class="timezone" id="est">EST: </div>\n        <div class="timezone" id="pst">PST: </div>\n    </div>\n    <script>\n        function updateClocks() {\n            const now = new Date();\n            const utcTime = now.toUTCString().slice(17, 25);\n            const estTime = new Date(now.setHours(now.getHours() - 5)).toUTCString().slice(17, 25);\n            const pstTime = new Date(now.setHours(now.getHours() - 3)).toUTCString().slice(17, 25);\n            document.getElementById('utc').innerText = 'UTC: ' + utcTime;\n            document.getElementById('est').innerText = 'EST: ' + estTime;\n            document.getElementById('pst').innerText = 'PST: ' + pstTime;\n        }\n        setInterval(updateClocks, 1000);\n        updateClocks();\n    </script>\n</body>\n</html>\n
